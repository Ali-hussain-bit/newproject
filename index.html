<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>

<body>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;

        }

        .one {
            display: flex;
            align-items: center;
            gap: 20px;
            justify-content: center;
            width: 100%;
            height: 20vh;
            background-color: rgba(153, 255, 0, 0.596);
        }

        .one input {
            padding: 20px;
            width: 80%;
            outline: none;
            border: none;
        }

        .TODO {
            background-color: rgba(0, 0, 0, 0.863);
            color: white;
            padding: 10px;

        }

        .TODO h1 {
            margin-left: 20px;
        }

        .one button {
            padding: 20px;
            border: none;
            background-color: rgb(217, 255, 1);
        }
        .two button{
             padding: 20px;
            border: none;
            background-color: rgb(217, 255, 1);
        }
        ul {
         display: flex;
         align-items: center;
         justify-content: center;
         gap: 20px;
         flex-direction: column;
         margin-top: 40px;
           
        }
        li{
            color: green;
            list-style: none;
            padding: 10px;
            background-color: greenyellow;
            border-radius: 30px;
            width: 70%
            ;
        }
    </style>
    <section>
        <div class="TODO">
            <h1>Todo</h1>
        </div>
        <div class="one">

            <input id="input" type="text">
            <button onclick="add()">Add</button>
        </div>
        <div class="two">
            <ul id="unordered">

            </ul>  <button class="delete" onclick="this.parentElement.remove()">Delete All</button>
        </div>
    </section>
    <script>

        function add() {
         let inputtext = document.getElementById("input")
         let inputvalue = inputtext.value

         if(inputvalue ===""){
            alert('please enter any thing from the keyboard')
         }

        let li = document.createElement("li")
        li.innerText = inputtext.value
        
        document.getElementById("unordered").appendChild(li)
        input.value = ""
    




    }




    </script>
</body>

</html>
